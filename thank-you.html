  <main class="section thank-you-page">
    <div class="container">
      <div class="thank-you-wrap thank-you-card">
        <div class="legal-toolbar">
          <button id="lang-toggle" class="btn" type="button" aria-label="Switch language">EN</button>
        </div>

        <h1 data-i18n="h1">شكرًا لك</h1>
        <p data-i18n="p1">تم استلام طلبك بنجاح، وسيقوم أحد أفراد فريقنا بالتواصل معك في أقرب وقت.</p>
        <p data-i18n="p2">متوسط وقت الرد: خلال نفس اليوم في مواعيد العمل.</p>

        <div class="thank-you-actions">
          <a class="btn" href="all-projects.html" data-i18n="projectsLink">استعرض المشاريع</a>
          <a class="btn btn-whatsapp" href="https://wa.me/20100123456" target="_blank" rel="noopener noreferrer" data-i18n="whatsAppLink">تواصل واتساب</a>
        </div>

        <p><a class="text-link" href="index.html" data-i18n="homeLink">العودة للرئيسية</a></p>
      </div>
    </div>
  </main>

  <script>
    (function () {
      var copy = {
        ar: {
          pageTitle: 'هايد بارك | شكرًا لك',
          pageDesc: 'شكرًا لتواصلك معنا',
          dir: 'rtl',
          lang: 'ar',
          btn: 'EN',
          h1: 'شكرًا لك',
          p1: 'تم استلام طلبك بنجاح، وسيقوم أحد أفراد فريقنا بالتواصل معك في أقرب وقت.',
          p2: 'متوسط وقت الرد: خلال نفس اليوم في مواعيد العمل.',
          projectsLink: 'استعرض المشاريع',
          whatsAppLink: 'تواصل واتساب',
          homeLink: 'العودة للرئيسية'
        },
        en: {
          pageTitle: 'Hyde Park | Thank You',
          pageDesc: 'Thank you for contacting us',
          dir: 'ltr',
          lang: 'en',
          btn: 'AR',
          h1: 'Thank You',
          p1: 'Your request has been received successfully. A member of our team will contact you shortly.',
          p2: 'Average response time: within the same business day.',
          projectsLink: 'Browse Projects',
          whatsAppLink: 'Contact on WhatsApp',
          homeLink: 'Back to Home'
        }
      };

      var toggleBtn = document.getElementById('lang-toggle');
      var metaDesc = document.querySelector('meta[name="description"]');
      var current = 'ar';

      function applyLang(nextLang) {
        var t = copy[nextLang];
        document.documentElement.lang = t.lang;
        document.documentElement.dir = t.dir;
        document.title = t.pageTitle;
        if (metaDesc) metaDesc.setAttribute('content', t.pageDesc);

        var nodes = document.querySelectorAll('[data-i18n]');
        for (var i = 0; i < nodes.length; i++) {
          var key = nodes[i].getAttribute('data-i18n');
          if (t[key]) nodes[i].textContent = t[key];
        }

        toggleBtn.textContent = t.btn;
        current = nextLang;
      }

      toggleBtn.addEventListener('click', function () {
        applyLang(current === 'ar' ? 'en' : 'ar');
      });

      applyLang('ar');
    })();
  </script>
</body>
